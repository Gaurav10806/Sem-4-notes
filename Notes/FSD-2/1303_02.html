<!-- Initialize 2 var and inc both var each time and display the addition of both var at interval of 1 sec -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="p1"></p>
    <script>
        var a = 2
        var b = 5
        let count = 0

        const i = setInterval(()=>{
            document.getElementById("p1").innerHTML= a++ + b++
            count++
            if(count === 5){
                clearInterval(i)
            }
        },1000
        )


    </script>
</body>
</html>
